name: Slash Command - Assign
on:
  issue_comment:
    types: [created]
jobs:
  assign:
    if: >
      github.event.issue &&
      startsWith(github.event.comment.body, '/assign')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const comment = context.payload.comment.body.trim();
            const issue = context.payload.issue;
            const commenter = context.payload.comment.user.login;
            if (comment.startsWith('/unassign')) {
              await github.rest.issues.removeAssignees({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, assignees: [commenter],
              });
              return;
            }
            const match = comment.match(/\/assign\s+@?(\S+)/);
            const assignee = match ? match[1] : commenter;
            await github.rest.issues.addAssignees({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number, assignees: [assignee],
            });
