name: First-Time Contributor
on:
  pull_request:
    types: [opened]
permissions:
  pull-requests: write
jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const creator = context.payload.pull_request.user.login;
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'all', per_page: 2,
            });
            const isFirstPR = pulls.filter(p => p.user.login === creator).length <= 1;
            if (isFirstPR) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `Welcome @${creator}! Thank you for your first contribution! A maintainer will review your PR shortly. Please make sure your commits are signed off (\`git commit -s\`) for the DCO check.`,
              });
            }
