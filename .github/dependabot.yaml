version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    rebase-strategy: disabled
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    rebase-strategy: disabled
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
          - "docusaurus-*"
      react:
        patterns:
          - "react"
          - "react-dom"
